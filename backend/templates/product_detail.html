{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <script src="{% static 'js/script.js' %}"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f5f3ef] text-gray-800">

<!-- NAVBAR -->
<header class="flex justify-between items-center px-10 py-6">
    <h1 class="text-2xl font-semibold">Varee</h1>

    <nav class="space-x-10 text-gray-600">
        <a href="/home/">Home</a>
        <div class="flex items-center gap-6">

<a href="/cart/"><span class="material-symbols-outlined">shopping_bag</span></a>
<a href="/orders/"><span class="material-symbols-outlined">receipt_long</span></a>
<a href="/wishlist/"><span class="material-symbols-outlined">favorite</span></a>

<!-- ✅ NEW LINKS -->
<a href="/profile/" class="text-sm">Profile</a>
<a href="/terms/" class="text-sm">Terms</a>
<a href="/shipping/" class="text-sm">Shipping</a>
<a href="/sustainability/" class="text-sm">Sustainability</a>

<a href="/logout/"><span class="material-symbols-outlined">logout</span></a>

</div>
    </nav>

    <div>🛍️</div>
</header>

<!-- MAIN -->
<div class="max-w-7xl mx-auto px-10 py-10">

    <div class="grid lg:grid-cols-2 gap-16">

        <!-- LEFT IMAGE -->
        <div>
            <img id="product-img"
                class="w-full rounded-3xl shadow-lg object-cover h-[600px]">
        </div>

        <!-- RIGHT CONTENT -->
        <div>

            <p class="text-sm text-gray-500 mb-2">NEW ARRIVAL</p>

            <h1 id="product-name"
                class="text-5xl font-semibold leading-tight mb-4"></h1>

            <p id="product-category" class="text-gray-500 mb-2"></p>

            <p id="product-price"
                class="text-2xl mb-6"></p>

            <p id="product-desc"
                class="text-gray-600 leading-relaxed mb-10"></p>

            <!-- BUTTONS -->
            <div class="flex flex-col gap-4 mb-10">

                <button onclick="addToCart(getProductId())"
                    class="bg-pink-200 py-4 rounded-full text-lg font-medium hover:opacity-90">
                    Add to Cart
                </button>

                <button
                    class="border py-4 rounded-full text-lg hover:bg-gray-100">
                    Buy Now
                </button>

            </div>

        </div>
    </div>

    <!-- RELATED -->
    <div class="mt-20">

        <h2 class="text-2xl font-semibold mb-6">You May Also Like</h2>

        <div id="related-products"
            class="grid grid-cols-2 md:grid-cols-4 gap-6">
        </div>

    </div>

</div>

<!-- JS -->

<script>
// ✅ GET PRODUCT ID

// ✅ LOAD PRODUCT DETAIL
async function loadProductDetail() {

    const parts = window.location.pathname.split("/");
    const id = parts[parts.length - 2];

    if (!id) return;

    try {
        const res = await fetch(`/api/products/${id}/`);

        if (!res.ok) {
            console.log("API ERROR");
            return;
        }

        const product = await res.json();

        document.getElementById("product-name").innerText = product.name;
        document.getElementById("product-price").innerText = "₹" + product.price;
        document.getElementById("product-img").src = product.image;
        document.getElementById("product-desc").innerText = product.description || "";
        document.getElementById("product-category").innerText = product.category;

    } catch (err) {
        console.error(err);
    }
}

function getProductId() {
    const parts = window.location.pathname.split("/");
    return parts[parts.length - 2];
}

window.onload = loadProductDetail;
// ✅ ADD TO CART (NO DUPLICATE)
async function addToCart(productId) {
    try {
        const res = await fetch("/api/cart/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                product_id: productId
            })
        });

        const data = await res.json();

        if (!res.ok) {
            alert("⚠️ Already added to cart");
            return;
        }

        alert("✅ Added to cart");

    } catch (err) {
        console.error(err);
        alert("Error ❌");
    }
}

// ✅ LOAD RELATED PRODUCTS
async function loadRelated() {
    const res = await fetch("/api/products/");
    const data = await res.json();

    const container = document.getElementById("related-products");
    container.innerHTML = "";

    data.forEach(p => {
        container.innerHTML += `
            <div class="bg-white p-4 rounded-xl shadow">
                <img src="${p.image}" class="h-40 w-full object-cover rounded mb-2">
                <h3>${p.name}</h3>
                <p class="text-gray-500">₹${p.price}</p>
            </div>
        `;
    });
}

// 🚀 INIT
window.onload = () => {
    loadProductDetail();
    loadRelated();
};
</script>

</body>
</html>
