<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-gray-100">

<!-- NAVBAR -->
<div class="flex items-center gap-6 mb-6">
<a href="/home/">Home</a>
<a href="/cart/">Cart</a>
<a href="/orders/">Orders</a>
<a href="/wishlist/">Wishlist</a>
<a href="/profile/">Profile</a>
<a href="/terms/">Terms</a>
<a href="/shipping/">Shipping</a>
<a href="/sustainability/">Sustainability</a>
<a href="/logout/">Logout</a>
</div>

<h1 class="text-2xl mb-6">Checkout</h1>

<div class="grid grid-cols-1 md:grid-cols-2 gap-10">

    <!-- LEFT: ITEMS -->
    <div id="checkout-items"></div>

    <!-- RIGHT: SUMMARY -->
    <div class="bg-white p-6 rounded shadow">

        <h2 class="text-xl mb-4">Order Summary</h2>

        <p>Subtotal: ₹<span id="subtotal">0</span></p>
        <p>Tax (5%): ₹<span id="tax">0</span></p>

        <h3 class="mt-4 text-lg font-bold">
            Total: ₹<span id="total">0</span>
        </h3>

        <!-- ✅ FORM START -->
        <form method="POST" action="/checkout/">
            {% csrf_token %}

            <!-- ADDRESS -->
            <h3 class="mt-6 font-semibold">Delivery Address</h3>
            <textarea name="address"
                class="w-full border p-2 mt-2 rounded"
                placeholder="Enter your address"
                required></textarea>

            <!-- PAYMENT -->
            <h3 class="mt-6 font-semibold">Payment Method</h3>

            <label class="block mt-2">
                <input type="radio" name="payment" value="COD" checked>
                Cash on Delivery
            </label>

            <label class="block">
                <input type="radio" name="payment" value="UPI">
                UPI
            </label>

            <label class="block">
                <input type="radio" name="payment" value="CARD">
                Card
            </label>

            <button type="submit"
                class="w-full mt-6 bg-black text-white p-3 rounded">
                Place Order
            </button>

        </form>
        <!-- ✅ FORM END -->

    </div>

</div>

<script>

// ✅ LOAD CHECKOUT DATA
async function loadCheckout() {
    const res = await fetch("/api/cart/");
    const cart = await res.json();

    const container = document.getElementById("checkout-items");
    container.innerHTML = "";

    let subtotal = 0;

    cart.forEach(item => {

        const price = item.product.price * item.quantity;
        subtotal += price;

        container.innerHTML += `
        <div class="flex gap-4 mb-4 bg-white p-4 rounded">

            <img src="http://127.0.0.1:8000${item.product.image}"
                class="w-20 h-20 object-cover"/>

            <div>
                <h3 class="font-semibold">${item.product.name}</h3>
                <p>₹${item.product.price}</p>
                <p>Qty: ${item.quantity}</p>
            </div>

        </div>
        `;
    });

    const tax = Math.floor(subtotal * 0.05);
    const total = subtotal + tax;

    document.getElementById("subtotal").innerText = subtotal;
    document.getElementById("tax").innerText = tax;
    document.getElementById("total").innerText = total;
}

// INIT
loadCheckout();

</script>

</body>
</html>
