<!DOCTYPE html>
<html>
<head>
    <title>Order Tracking</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">
<div class="flex items-center gap-6">

<a href="/cart/"><span class="material-symbols-outlined">shopping_bag</span></a>
<a href="/orders/"><span class="material-symbols-outlined">receipt_long</span></a>
<a href="/wishlist/"><span class="material-symbols-outlined">favorite</span></a>

<!-- ✅ NEW LINKS -->
<a href="/profile/" class="text-sm">Profile</a>
<a href="/terms/" class="text-sm">Terms</a>
<a href="/shipping/" class="text-sm">Shipping</a>
<a href="/sustainability/" class="text-sm">Sustainability</a>

<a href="/logout/"><span class="material-symbols-outlined">logout</span></a>

</div>
<h1 class="text-2xl mb-6">Track Order</h1>

<div id="box" class="bg-white p-6 rounded shadow"></div>

<script>

const orderId = window.location.pathname.split("/")[2];

async function loadOrder() {

    const res = await fetch(`/api/orders/${orderId}/`);
    const data = await res.json();

    let itemsHTML = "";

    data.items.forEach(item => {
        itemsHTML += `
        <div class="flex gap-4 mb-4">
            <img src="http://127.0.0.1:8000${item.image}" class="w-20 h-20">
            <div>
                <p>${item.name}</p>
                <p>Qty: ${item.quantity}</p>
                <p>₹${item.price}</p>
            </div>
        </div>
        `;
    });

    document.getElementById("box").innerHTML = `
        <h2 class="text-xl mb-2">Order #${data.id}</h2>
        <p>Status: <b>${data.status}</b></p>
        <p>Address: ${data.address}</p>

        <div class="mt-4">
            ${itemsHTML}
        </div>

        <h3 class="mt-4 font-bold">Total: ₹${data.total}</h3>
    `;
}

loadOrder();

</script>

</body>
</html>
