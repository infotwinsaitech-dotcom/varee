{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="flex items-center gap-6">

<a href="/cart/"><span class="material-symbols-outlined">shopping_bag</span></a>
<a href="/orders/"><span class="material-symbols-outlined">receipt_long</span></a>
<a href="/wishlist/"><span class="material-symbols-outlined">favorite</span></a>

<!-- ✅ NEW LINKS -->
<a href="/profile/" class="text-sm">Profile</a>
<a href="/terms/" class="text-sm">Terms</a>
<a href="/shipping/" class="text-sm">Shipping</a>
<a href="/sustainability/" class="text-sm">Sustainability</a>

<a href="/logout/"><span class="material-symbols-outlined">logout</span></a>

</div>
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

        <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="password" name="password" placeholder="New Password"
                class="border p-3 w-full mb-4 rounded-lg"/>

            <input type="password" name="confirm_password" placeholder="Confirm Password"
                class="border p-3 w-full mb-4 rounded-lg"/>

            <button type="submit"
                class="bg-yellow-500 text-white px-6 py-3 rounded-full w-full">
                Update Password
            </button>
        </form>

        {% if messages %}
            {% for message in messages %}
                <p class="text-red-500 mt-3 text-center">{{ message }}</p>
            {% endfor %}
        {% endif %}

    </div>

</body>
</html>
