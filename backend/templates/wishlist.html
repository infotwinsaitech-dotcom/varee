<!DOCTYPE html>
<html>
<head>
    <title>Wishlist | Varee</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ICONS -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="bg-[#f5f3ef]">

<!-- 🔝 NAVBAR -->
<div class="flex justify-between items-center px-10 py-6">

    <h1 class="text-2xl font-serif tracking-widest">VAREE</h1>

    <div class="flex gap-8 text-sm">
        <a href="/home/">Home</a>
        <a href="/products/">Collections</a>
        <a href="/wishlist/" class="border-b">Wishlist</a>
    </div>

    <div class="flex gap-4">
        <a href="/cart/"><span class="material-symbols-outlined">shopping_bag</span></a>
        <a href="/profile/"><span class="material-symbols-outlined">person</span></a>
    </div>

</div>

<!-- 🔥 HEADER -->
<div class="px-10 mt-10 mb-10">

    <h2 class="text-5xl font-serif leading-tight">
        Your Curated <br> <span class="italic">Sanctuary</span>
    </h2>

    <p class="text-gray-500 mt-4 max-w-md">
        A private collection of your most loved pieces.
    </p>

</div>

<!-- 🛍️ PRODUCTS -->
<div id="wishlist-items" class="grid grid-cols-1 md:grid-cols-3 gap-10 px-10 pb-20"></div>

<!-- 🔥 SUBSCRIBE SECTION -->
<div class="mx-10 mb-16 bg-[#e9e5df] rounded-3xl p-10 flex justify-between items-center">

    <div>
        <h2 class="text-3xl font-serif mb-2">Join the Atelier</h2>
        <p class="text-gray-600 text-sm">
            Subscribe for exclusive drops.
        </p>

        <div class="mt-4 flex gap-3">
            <input type="text" placeholder="Your email"
                class="px-4 py-2 rounded-full border w-64">

            <button class="bg-black text-white px-6 rounded-full">
                Subscribe
            </button>
        </div>
    </div>

</div>

<!-- 🔻 FOOTER -->
<div class="text-center text-xs text-gray-500 pb-6">
    © 2026 Varee
</div>

<!-- 🔥 SCRIPT -->
<script>

async function loadWishlist() {

    const res = await fetch("/api/wishlist/");
    const data = await res.json();

    const container = document.getElementById("wishlist-items");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = `<p>No items in wishlist</p>`;
        return;
    }

    data.forEach(item => {

        container.innerHTML += `
        <div class="bg-white p-4 rounded-3xl shadow-sm relative">

            <!-- ❌ REMOVE BUTTON -->
            <button onclick="removeFromWishlist(${item.product.id})"
                class="absolute top-3 right-3 bg-gray-200 rounded-full w-7 h-7">
                ✕
            </button>

            <img src="http://127.0.0.1:8000${item.product.image}"
                class="w-full h-60 object-cover rounded-2xl mb-4"/>

            <h3 class="font-semibold text-lg">${item.product.name}</h3>

            <p class="text-sm text-gray-500">In Stock</p>

            <div class="flex justify-between items-center mt-3">

                <p class="font-semibold">₹${item.product.price}</p>

                <button onclick="addToCart(${item.product.id})"
                    class="bg-yellow-600 text-white px-4 py-2 rounded-full text-sm">
                    Add to Bag
                </button>

            </div>

        </div>
        `;
    });
}

async function removeFromWishlist(productId) {

    await fetch(`/api/wishlist/remove/${productId}/`, {
        method: "POST"
    });

    loadWishlist();
}

async function addToCart(productId) {

    await fetch("/add-to-cart/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: `product_id=${productId}`
    });

    alert("Added to cart 🛒");
}

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

loadWishlist();

</script>

</body>
</html>
