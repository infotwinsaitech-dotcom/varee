{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<title>{% block title %}Varee{% endblock %}</title>

<body class="bg-background text-on-surface">

<nav class="bg-[#faf9f6]/70 backdrop-blur-xl sticky top-0 z-50">
<div class="flex justify-between items-center w-full px-8 py-6 max-w-[1440px] mx-auto">

<div class="text-2xl font-serif">Varee</div>

<div class="flex items-center gap-6">

</div>
</nav>

<div class="px-6 py-10">

{% endblock %}
</div>

<!-- ✅ FOOTER -->
<footer class="bg-gray-100 text-center py-10 mt-10">

<p>© 2026 Varee</p>

<div class="mt-4 flex justify-center gap-6 text-sm">
