{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<title>{% block title %}Varee{% endblock %}</title>
</head>

<body class="bg-[#f8f6f2] text-gray-800">

<!-- 🔥 NAVBAR -->
<nav class="flex justify-between items-center px-10 py-6 bg-white shadow-sm">

<div class="text-2xl font-serif">Varee</div>

<div class="flex gap-6 text-sm">
<a href="/home/">Home</a>
<a href="/products/">Shop</a>
<a href="/wishlist/">Wishlist</a>
<a href="/orders/">Orders</a>
<a href="/profile/">Profile</a>
<a href="/user-dashboard/">Dashboard</a>

</div>

<div class="flex gap-4">
<a href="/cart/">🛒</a>
<a href="/wishlist/">Wishlist</a>
<a href="/logout/">Logout</a>
</div>

</nav>

<!-- CONTENT -->
<div class="max-w-[1300px] mx-auto">
{% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="bg-white mt-20 py-10 text-center text-sm">
<p>© 2026 Varee</p>
<div class="flex justify-center gap-6 mt-3">
<a href="/privacy/">Privacy</a>
<a href="/terms/">Terms</a>
<a href="/contact/">Contact</a>
</div>
</footer>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
