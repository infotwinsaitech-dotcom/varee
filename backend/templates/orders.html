{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders | Varee</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="{% static 'js/script.js' %}"></script>

<style>
body { font-family: 'Inter', sans-serif; }

</head>

<body class="bg-[#f6f5f2] text-gray-800">
