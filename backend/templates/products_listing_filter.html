{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Products | Varee</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#f5f3ef] p-6">

<div class="flex gap-6">

<!-- FILTER -->
<div class="w-1/4 bg-white p-5 rounded-2xl">

    <h2 class="text-xl font-semibold mb-4">Filters</h2>

    <form method="GET">

        <input type="text" name="q" placeholder="Search..."
        class="w-full border p-2 mb-4 rounded">

        <input type="number" name="min" placeholder="Min Price"
        class="w-full border p-2 mb-2 rounded">

        <input type="number" name="max" placeholder="Max Price"
        class="w-full border p-2 mb-4 rounded">

        <button class="w-full bg-black text-white py-2 rounded">
            Apply
        </button>

    </form>

</div>

<!-- PRODUCTS -->
<div class="w-3/4 grid grid-cols-3 gap-6">

{% for product in products %}
<div class="bg-white p-4 rounded-2xl">

    <img src="{{ product.image.url }}" 
     onerror="this.src='/static/default.png'"
     class="h-40 w-full object-cover rounded mb-3">

    <h3 class="font-semibold">{{ product.name }}</h3>

    <p class="text-gray-500 text-sm">{{ product.category }}</p>

    <p class="mt-2 font-semibold">₹{{ product.price }}</p>

    <a href="{% url 'product_detail' product.id %}"
    class="block mt-3 bg-black text-white text-center py-2 rounded">
        View
    </a>

</div>
{% endfor %}

</div>

</div>

</body>
</html>
