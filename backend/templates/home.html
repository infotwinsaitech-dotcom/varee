<script>

let wishlist = [];

// ✅ LOAD WISHLIST
async function loadWishlist() {
    const res = await fetch("/api/wishlist/");
    const data = await res.json();

    wishlist = data.map(item => item.product.id);

    loadProducts();
}

// ✅ LOAD PRODUCTS
async function loadProducts() {
    const container = document.getElementById("product-container");

    const res = await fetch("/api/products/");
    const products = await res.json();

    container.innerHTML = "";

    products.forEach(p => {

        const isWish = wishlist.includes(p.id);

        container.innerHTML += `
<div class="bg-white rounded-xl shadow p-4 relative">

    <!-- ❤️ HEART -->
    <button onclick="toggleWishlist(${p.id})"
        class="absolute top-2 right-2 text-2xl
        ${isWish ? 'text-black' : 'text-pink-500'}">
        ♥
    </button>

    <!-- PRODUCT -->
    <a href="/product-detail/${p.id}/">
        <img src="${p.image ? p.image : '/static/default.png'}"
            class="w-full h-48 object-cover rounded-lg" />

        <h3 class="mt-4 font-semibold text-lg">${p.name}</h3>
    </a>

    <p class="text-gray-500 text-sm">
        ${p.category} - ${p.subcategory}
    </p>

    <p class="mt-2 font-bold text-xl">₹${p.price}</p>

    <!-- ✅ FIXED BUTTON -->
    <button onclick="addToCart(${p.id}, this)"
        class="mt-3 w-full bg-black text-white py-2 rounded-full">
        Add to Cart
    </button>

</div>
`;
    });
}

// ✅ TOGGLE WISHLIST
async function toggleWishlist(productId) {

    if (wishlist.includes(productId)) {

        await fetch(`/api/wishlist/remove/${productId}/`, {
            method: "POST"
        });

        wishlist = wishlist.filter(id => id !== productId);

    } else {

        await fetch("/api/wishlist/add/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ product_id: productId })
        });

        wishlist.push(productId);
    }

    loadProducts();
}

// 🛒 ✅ FINAL ADD TO CART FIX
function getCSRFToken() {
    let cookieValue = null;
    const cookies = document.cookie.split(';');

    for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith('csrftoken=')) {
            cookieValue = cookie.substring('csrftoken='.length);
            break;
        }
    }
    return cookieValue;
}

async function addToCart(productId, btn) {

    btn.innerText = "Adding...";
    btn.disabled = true;

    try {
        const res = await fetch("/api/cart/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken()
            },
            credentials: "same-origin",   // 🔥 VERY IMPORTANT
            body: JSON.stringify({
                product_id: productId
            })
        });

        const data = await res.json();

        if (res.ok) {
            alert("✅ Added to cart");   // 👈 popup वापस
        }

    } catch (err) {
        console.error(err);
        alert("Error ❌");
    }

    btn.innerText = "Add to Cart";
    btn.disabled = false;
}

// INIT
loadWishlist();

</script>
