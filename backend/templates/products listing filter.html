{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex">
<div class="flex items-center gap-6">

<a href="/cart/"><span class="material-symbols-outlined">shopping_bag</span></a>
<a href="/orders/"><span class="material-symbols-outlined">receipt_long</span></a>
<a href="/wishlist/"><span class="material-symbols-outlined">favorite</span></a>

<!-- ✅ NEW LINKS -->
<a href="/profile/" class="text-sm">Profile</a>
<a href="/terms/" class="text-sm">Terms</a>
<a href="/shipping/" class="text-sm">Shipping</a>
<a href="/sustainability/" class="text-sm">Sustainability</a>

<a href="/logout/"><span class="material-symbols-outlined">logout</span></a>

</div>
    <!-- FILTER SIDEBAR -->
    <div class="w-64 bg-white p-6 shadow">

        <h2 class="text-xl font-bold mb-4">Filters</h2>

        <!-- CATEGORY -->
        <div class="mb-6">
            <h3 class="font-semibold mb-2">Category</h3>

<!-- CATEGORY -->
<select id="category" class="border p-2 mb-4 w-full">
    <option value="">All Category</option>
</select>

<!-- SUBCATEGORY -->
<select id="subcategory" class="border p-2 mb-4 w-full">
    <option value="">All SubCategory</option>
</select>

<!-- PRICE -->
<input type="number" id="price" placeholder="Max Price" class="border p-2 mb-4 w-full">

<button onclick="applyFilters()" class="bg-black text-white px-4 py-2 w-full">
    Apply Filters
</button>
        <!-- PRICE -->
        <div class="mb-6">
            <h3 class="font-semibold mb-2">Max Price</h3>

            <input type="number" id="price" placeholder="Enter price"
                   class="w-full border p-2">
        </div>

        <button onclick="applyFilters()"
            class="w-full bg-black text-white py-2 rounded">
            Apply Filters
        </button>

    </div>

    <!-- PRODUCTS -->
    <div class="flex-1 p-8">

        <h1 class="text-2xl font-bold mb-6">Products</h1>

        <div id="products"
             class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>

    </div>

</div>

<script>
async function loadProducts(url="/api/products/") {

    const res = await fetch(url);
    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(p => {
        container.innerHTML += `
        <div class="bg-white p-4 rounded shadow">

            <img src="${p.image}" class="w-full h-48 object-cover">

            <h3 class="mt-3 font-bold">${p.name}</h3>
            <p>₹${p.price}</p>
            <p class="text-sm text-gray-500">${p.category}</p>

            <button onclick="addToCart(${p.id})"
                class="mt-3 w-full bg-black text-white py-2 rounded">
                Add to Cart
            </button>

        </div>
        `;
    });
}

function applyFilters() {

    const category = document.getElementById("category").value;
    const price = document.getElementById("price").value;

    let url = "/api/products/?";

    if (category) {
        url += `category=${category}&`;
    }

    if (price) {
        url += `price=${price}`;
    }

    loadProducts(url);
}

async function addToCart(id) {
    await fetch("/api/cart/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            product: id,
            quantity: 1
        })
    });

    alert("Added to cart ✅");
}
let API_URL = "/api/products/";

async function loadProducts(url = API_URL) {
    const res = await fetch(url);
    const data = await res.json();

    const container = document.querySelector(".grid");

    container.innerHTML = "";

    data.forEach(p => {
        container.innerHTML += `
        <div class="group">

            <div class="relative aspect-[3/4] bg-white rounded-xl overflow-hidden mb-4">
                <img src="${p.image}" class="w-full h-full object-cover">
            </div>

            <div class="px-2">
                <h3 class="text-lg font-semibold">${p.name}</h3>
                <p class="text-gray-500">₹${p.price}</p>

                <p class="text-xs text-gray-400">
                    ${p.category} / ${p.subcategory}
                </p>

                <button onclick="addToCart(${p.id})"
                class="w-full mt-3 py-2 bg-black text-white rounded">
                Add to Cart
                </button>
            </div>

        </div>
        `;
    });
}


// ✅ CATEGORY LOAD
async function loadCategories() {
    const res = await fetch("/api/categories/");
    const data = await res.json();

    const select = document.getElementById("category");

    data.forEach(c => {
        select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
    });
}


// ✅ SUBCATEGORY LOAD
async function loadSubcategories() {
    const category = document.getElementById("category").value;

    const res = await fetch(`/api/subcategories/?category=${category}`);
    const data = await res.json();

    const sub = document.getElementById("subcategory");

    sub.innerHTML = `<option value="">All SubCategory</option>`;

    data.forEach(s => {
    sub.innerHTML += `<option value="${s.name.trim()}">${s.name}</option>`;
});
}


// ✅ APPLY FILTER
function applyFilters() {
    const category = document.getElementById("category").value;
    const subcategory = document.getElementById("subcategory").value;
    const price = document.getElementById("price").value;

    let url = "/api/products/?";

    if (category) url += `category=${category}&`;
    if (subcategory) url += `subcategory=${subcategory.trim()}&`;
    if (price) url += `price=${price}`;

    loadProducts(url);
}


// ✅ EVENT
document.getElementById("category").addEventListener("change", loadSubcategories);


// INIT
loadCategories();
loadProducts();

loadProducts();
</script>

</body>
</html>
