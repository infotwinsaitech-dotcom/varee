{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Verify OTP | Varee</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter&display=swap" rel="stylesheet">

</head>

<body class="h-screen flex bg-[#f5f3ef] font-[Inter]">

<!-- LEFT -->
<div class="w-1/2 hidden lg:block relative">

    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"
    class="w-full h-full object-cover">

    <div class="absolute inset-0 bg-black/40 flex flex-col justify-between p-16 text-white">

        <h1 class="text-xl tracking-[0.3em]">VAREE</h1>

        <div>
            <h1 class="text-6xl font-[Playfair_Display] leading-tight">
                Enter OTP <br> to continue
            </h1>

            <p class="mt-4 text-sm opacity-90">
                Secure login verification
            </p>
        </div>

        <p class="text-xs opacity-70">
            VAREE EDITORIAL © 2024
        </p>

    </div>
</div>

<!-- RIGHT -->
<div class="w-full lg:w-1/2 flex items-center justify-center">

<div class="w-full max-w-md space-y-6 px-6">

<h2 class="text-3xl font-[Playfair_Display] text-center text-[#7a5c00]">
    Verify OTP
</h2>

<p class="text-center text-sm text-gray-400">
    Enter OTP from console
</p>

<!-- ✅ IMPORTANT: correct action -->
<form method="POST" action="/verify-otp/" onsubmit="submitOTP()" class="space-y-6 mt-6">
{% csrf_token %}

<!-- OTP BOXES -->
<div class="flex justify-between gap-2">

    <input maxlength="1" class="otp-box w-12 h-14 text-center border-b outline-none">
    <input maxlength="1" class="otp-box w-12 h-14 text-center border-b outline-none">
    <input maxlength="1" class="otp-box w-12 h-14 text-center border-b outline-none">
    <input maxlength="1" class="otp-box w-12 h-14 text-center border-b outline-none">

</div>

<!-- ✅ hidden input (important) -->
<input type="hidden" name="otp" id="fullOtp">

<!-- LOGIN BUTTON -->
<button type="submit"
class="w-full bg-gradient-to-r from-[#7a5c00] to-[#d4af37] text-white py-3 rounded-full tracking-widest">
VERIFY OTP
</button>

</form>

</div>
</div>

<script>

// OTP inputs
const otpInputs = document.querySelectorAll(".otp-box");

// auto move
otpInputs.forEach((input, index) => {

    input.addEventListener("input", () => {
        input.value = input.value.replace(/[^0-9]/g, "");

        if (input.value && index < otpInputs.length - 1) {
            otpInputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            otpInputs[index - 1].focus();
        }
    });

});

// submit OTP combine
function submitOTP() {

    let otp = "";
    otpInputs.forEach(i => otp += i.value);

    document.getElementById("fullOtp").value = otp;
}

</script>

</body>
</html>
